  const CLAN_TAG = "#G09GCYPJ";

  async function loadClan() {
    const proxy = "https://corsproxy.io/?";
    const url = `${proxy}https://api.clashroyale.com/v1/clans/${encodeURIComponent(CLAN_TAG)}`;
    try {
      const res = await fetch(url, {
        headers: { Authorization: `Bearer ${API_KEY}` }
      });
      if(!res.ok){
        document.getElementById("content").innerHTML = "❌ API Key inválida o error en la API";
        return;
      }
      const data = await res.json();
      renderClan(data);
    } catch(e) {
      document.getElementById("content").innerHTML = "❌ Failed to fetch (problema de conexión o CORS)";
    }
  }

  function renderClan(data) {
    document.getElementById("content").innerHTML = `
      <div class="card">
        <h2>${data.name}</h2>
        <p>🏆 Puntos: ${data.clanScore}</p>
        <p>👥 Miembros: ${data.members}</p>
        <p>⚔️ Guerra: ${data.clanWarTrophies}</p>
        <p>📍 Ubicación: ${data.location?.name || 'Chile'}</p>
      </div>
    `;
  }

  // 🚀 INICIO
  loadClan();
</script>
