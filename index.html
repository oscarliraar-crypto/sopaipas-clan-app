const CLAN_TAG = "#G09GCYPJ";

async function apiCall(endpoint){
  const tag = CLAN_TAG.replace('#','%23');
  const url = `https://api.clashroyale.com/v1${endpoint.replace('{tag}',tag)}`;
  const proxy = "https://corsproxy.io/?";

  try{
    const res = await fetch(proxy + encodeURIComponent(url),{
      headers:{
        Authorization:`Bearer ${API_KEY}`
      }
    });

    if(!res.ok){
      document.getElementById("content").innerHTML = "❌ Error API o KEY inválida";
      return;
    }

    return await res.json();

  }catch(e){
    document.getElementById("content").innerHTML = "❌ Error de conexión";
  }
}

// ✅ FUNCIÓN ARREGLADA
async function loadClan(){
  const data = await apiCall('/clans/{tag}');
  if(!data) return;

  document.getElementById("content").innerHTML = `
    <div class="card">
      <h2>${data.name}</h2>
      <p>🏆 Puntos: ${data.clanScore}</p>
      <p>👥 Miembros: ${data.members}</p>
      <p>⚔️ Guerra: ${data.clanWarTrophies}</p>
    </div>
  `;
}

// 🚀 INICIO
loadClan();
