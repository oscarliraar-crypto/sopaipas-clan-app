const CLAN_TAG = "#G09GCYPJ";

// Proxy confiable para evitar errores de CORS
const PROXY = "https://api.allorigins.win/get?url=";

// 🔥 Función para llamar a la API
async function apiCall(endpoint){
    const tag = CLAN_TAG.replace('#','%23');
    const url = `https://api.clashroyale.com/v1${endpoint.replace('{tag}',tag)}`;
    try{
        const res = await fetch(PROXY + encodeURIComponent(url),{
            headers: { Authorization: `Bearer ${API_KEY}` }
        });
        if(!res.ok) throw new Error("Error API o Key inválida");
        const dataText = await res.json();
        // Si usamos allorigins, la respuesta viene en data.contents
        const data = JSON.parse(dataText.contents || dataText);
        return data;
    }catch(e){
        document.getElementById("content").innerHTML = `<div class="error">❌ ${e.message}</div>`;
        return null;
    }
}

// 🚀 Función para cargar el clan
async function loadClan(){
    const data = await apiCall('/clans/{tag}');
    if(!data) return;
    document.getElementById("content").innerHTML = `
    <div class="card">
        <h2>${data.name}</h2>
        <p>🏆 Puntos: ${data.clanScore}</p>
        <p>👥 Miembros: ${data.members}</p>
        <p>⚔️ Trofeos guerra: ${data.clanWarTrophies}</p>
        <p>🔒 Trofeos req.: ${data.requiredTrophies}</p>
        <p>🌎 Ubicación: ${data.location?.name || "Chile"}</p>
        <p>📜 Descripción: ${data.description || "Sin descripción"}</p>
    </div>`;
}

// 🚀 Inicio
loadClan();
